version: 1.0

benchmark:
  name: "FounderEndurance-v1"
  description: "A startup-founder survival simulator RL environment."
  version: "0.1.0"
  
tasks:
  - id: "founder_survival_easy"
    description: "Survive 90 days as a startup founder in an easy market."
    max_steps: 90
    reward_threshold: 400.0

  - id: "founder_survival_medium"
    description: "Survive 90 days as a startup founder in an average market."
    max_steps: 90
    reward_threshold: 350.0

  - id: "founder_survival_hard"
    description: "Survive 90 days as a startup founder in a highly volatile market."
    max_steps: 90
    reward_threshold: 300.0

environment:
  docker_image: "founderendurance:latest"
  entry_point: "server.app:app"

validation:
  test_episodes: 1
  timeout_seconds: 1200